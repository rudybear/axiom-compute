name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install SPIRV-Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-tools
      - name: Cargo test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Validate SPIR-V fixtures
        run: |
          find tests -name '*.spv' -print -exec spirv-val {} \; 2>&1 | tee /tmp/validate.log
          if grep -qi error /tmp/validate.log; then exit 1; fi
